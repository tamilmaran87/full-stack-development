# ========================
# APPLICATION SETTINGS
# ========================
spring.application.name=Recruitment Management System
server.port=8080

# ========================
# DATABASE CONFIGURATION
# Using H2 in-memory database for easy setup
# Switch to MySQL by uncommenting the MySQL section below
# ========================

