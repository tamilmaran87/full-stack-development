<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Student Dashboard')}">
    <title>Student Dashboard | RecruitPro</title>
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="page-content">
    <div class="container">
        <div class="dashboard-header">
            <div>
                <h1>Welcome, <span th:text="${user.fullName}">Student</span> 👋</h1>
                <p class="text-muted">Here's your application overview</p>
            </div>
            <a th:href="@{/jobs}" class="btn btn-primary"><i class="fas fa-search"></i> Browse Jobs</a>
        </div>

        <!-- Stats Cards -->
        <div class="dashboard-stats">
            <div class="stat-card glass-card stat-primary">
                <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
                <div class="stat-info">
                    <div class="stat-number" th:text="${totalApplications}">0</div>
                    <div class="stat-label">Total Applications</div>
                </div>
            </div>
            <div class="stat-card glass-card stat-info">
                <div class="stat-icon"><i class="fas fa-star"></i></div>
                <div class="stat-info">
                    <div class="stat-number" th:text="${shortlisted}">0</div>
                    <div class="stat-label">Shortlisted</div>
                </div>
            </div>
            <div class="stat-card glass-card stat-warning">
                <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                <div class="stat-info">
                    <div class="stat-number" th:text="${interviews}">0</div>
                    <div class="stat-label">Interviews</div>
                </div>
            </div>
            <div class="stat-card glass-card stat-success">
                <div class="stat-icon"><i class="fas fa-trophy"></i></div>
                <div class="stat-info">
                    <div class="stat-number" th:text="${hired}">0</div>
                    <div class="stat-label">Hired</div>
                </div>
            </div>
        </div>

        <div class="dashboard-grid">
            <!-- Recent Applications -->
            <div class="dashboard-card glass-card">
                <div class="card-header">
                    <h2><i class="fas fa-clock"></i> Recent Applications</h2>
                    <a th:href="@{/student/applications}" class="btn btn-sm btn-outline">View All</a>
                </div>
                <div class="card-body">
                    <div th:if="${not #lists.isEmpty(recentApplications)}">
                        <div class="app-list">
                            <div class="app-item" th:each="app : ${recentApplications}">
                                <div class="app-info">
                                    <h4 th:text="${app.job.title}">Job Title</h4>
                                    <span class="text-muted" th:text="${app.job.employer.fullName}">Company</span>
                                </div>
                                <span class="status-badge"
                                      th:classappend="${app.status.name() == 'APPLIED' ? 'status-applied' :
                                                        app.status.name() == 'SHORTLISTED' ? 'status-shortlisted' :
                                                        app.status.name() == 'INTERVIEW' ? 'status-interview' :
                                                        app.status.name() == 'HIRED' ? 'status-hired' : 'status-rejected'}"
                                      th:text="${app.status}">Status</span>
                            </div>
                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(recentApplications)}" class="empty-state-sm">
                        <i class="fas fa-inbox"></i>
                        <p>No applications yet. Start by browsing jobs!</p>
                    </div>
                </div>
            </div>

            <!-- Latest Jobs -->
            <div class="dashboard-card glass-card">
                <div class="card-header">
                    <h2><i class="fas fa-fire"></i> Latest Jobs</h2>
                    <a th:href="@{/jobs}" class="btn btn-sm btn-outline">View All</a>
                </div>
                <div class="card-body">
                    <div th:if="${not #lists.isEmpty(latestJobs)}">
                        <div class="app-list">
                            <div class="app-item" th:each="job : ${latestJobs}">
                                <div class="app-info">
                                    <h4 th:text="${job.title}">Job Title</h4>
                                    <span class="text-muted">
                                        <i class="fas fa-map-marker-alt"></i> <span th:text="${job.location ?: 'Remote'}">Location</span>
                                        &bull; <span th:text="${job.category}">Category</span>
                                    </span>
                                </div>
                                <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-sm btn-primary">Apply</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
