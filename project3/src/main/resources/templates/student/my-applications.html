<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('My Applications')}">
    <title>My Applications | RecruitPro</title>
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="page-content">
    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-file-alt"></i> My Applications</h1>
            <p th:text="'You have ' + ${applications.size()} + ' application(s)'">0 applications</p>
        </div>

        <!-- Applications Table -->
        <div class="table-card glass-card" th:if="${not #lists.isEmpty(applications)}">
            <div class="table-filter">
                <input type="text" id="appSearchInput" placeholder="Search applications..." class="form-control">
            </div>
            <div class="table-responsive">
                <table class="data-table" id="applicationsTable">
                    <thead>
                        <tr>
                            <th>Job Title</th>
                            <th>Company</th>
                            <th>Location</th>
                            <th>Applied Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="app : ${applications}">
                            <td th:text="${app.job.title}">Job Title</td>
                            <td th:text="${app.job.employer.fullName}">Company</td>
                            <td th:text="${app.job.location ?: 'Remote'}">Location</td>
                            <td th:text="${#temporals.format(app.appliedDate, 'dd MMM yyyy')}">Date</td>
                            <td>
                                <span class="status-badge"
                                      th:classappend="${app.status.name() == 'APPLIED' ? 'status-applied' :
                                                        app.status.name() == 'SHORTLISTED' ? 'status-shortlisted' :
                                                        app.status.name() == 'INTERVIEW' ? 'status-interview' :
                                                        app.status.name() == 'HIRED' ? 'status-hired' : 'status-rejected'}"
                                      th:text="${app.status}">Status</span>
                            </td>
                            <td>
                                <a th:href="@{/jobs/{id}(id=${app.job.id})}" class="btn btn-sm btn-outline">View Job</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(applications)}" class="empty-state">
            <i class="fas fa-inbox"></i>
            <h3>No applications yet</h3>
            <p>Start applying to jobs to track your progress here</p>
            <a th:href="@{/jobs}" class="btn btn-primary"><i class="fas fa-search"></i> Browse Jobs</a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
