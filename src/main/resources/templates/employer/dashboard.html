<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Employer Dashboard')}">
    <title>Employer Dashboard | RecruitPro</title>
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="page-content">
    <div class="container">
        <div class="dashboard-header">
            <div>
                <h1>Employer Dashboard 🏢</h1>
                <p class="text-muted">Welcome, <span th:text="${user.fullName}">Employer</span></p>
            </div>
            <a th:href="@{/employer/jobs/new}" class="btn btn-primary"><i class="fas fa-plus-circle"></i> Post New Job</a>
        </div>

        <div class="dashboard-stats">
            <div class="stat-card glass-card stat-primary">
                <div class="stat-icon"><i class="fas fa-briefcase"></i></div>
                <div class="stat-info">
                    <div class="stat-number" th:text="${totalJobs}">0</div>
                    <div class="stat-label">Posted Jobs</div>
                </div>
            </div>
            <div class="stat-card glass-card stat-info">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-info">
                    <div class="stat-number" th:text="${totalApplications}">0</div>
                    <div class="stat-label">Total Applicants</div>
                </div>
            </div>
            <div class="stat-card glass-card stat-warning">
                <div class="stat-icon"><i class="fas fa-star"></i></div>
                <div class="stat-info">
                    <div class="stat-number" th:text="${shortlisted}">0</div>
                    <div class="stat-label">Shortlisted</div>
                </div>
            </div>
            <div class="stat-card glass-card stat-success">
                <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                <div class="stat-info">
                    <div class="stat-number" th:text="${interviews}">0</div>
                    <div class="stat-label">Interviews</div>
                </div>
            </div>
        </div>

        <!-- Recent Applications -->
        <div class="dashboard-card glass-card">
            <div class="card-header">
                <h2><i class="fas fa-clock"></i> Recent Applications</h2>
                <a th:href="@{/employer/jobs}" class="btn btn-sm btn-outline">View All Jobs</a>
            </div>
            <div class="card-body">
                <div th:if="${not #lists.isEmpty(recentApplications)}">
                    <div class="app-list">
                        <div class="app-item" th:each="app : ${recentApplications}">
                            <div class="app-info">
                                <h4 th:text="${app.student.fullName}">Student Name</h4>
                                <span class="text-muted">
                                    Applied for: <strong th:text="${app.job.title}">Job</strong>
                                    &bull; <span th:text="${#temporals.format(app.appliedDate, 'dd MMM yyyy')}">Date</span>
                                </span>
                            </div>
                            <span class="status-badge"
                                  th:classappend="${app.status.name() == 'APPLIED' ? 'status-applied' :
                                                    app.status.name() == 'SHORTLISTED' ? 'status-shortlisted' :
                                                    app.status.name() == 'INTERVIEW' ? 'status-interview' :
                                                    app.status.name() == 'HIRED' ? 'status-hired' : 'status-rejected'}"
                                  th:text="${app.status}">Status</span>
                        </div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(recentApplications)}" class="empty-state-sm">
                    <i class="fas fa-inbox"></i>
                    <p>No applications received yet</p>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
