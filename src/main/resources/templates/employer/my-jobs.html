<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('My Jobs')}">
    <title>My Jobs | RecruitPro</title>
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="page-content">
    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-list"></i> My Posted Jobs</h1>
            <a th:href="@{/employer/jobs/new}" class="btn btn-primary"><i class="fas fa-plus-circle"></i> Post New Job</a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
        </div>

        <div class="table-card glass-card" th:if="${not #lists.isEmpty(jobs)}">
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Location</th>
                            <th>Applicants</th>
                            <th>Posted</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="job : ${jobs}">
                            <td><strong th:text="${job.title}">Title</strong></td>
                            <td><span class="job-category-badge small" th:text="${job.category}">Cat</span></td>
                            <td th:text="${job.location ?: 'Remote'}">Location</td>
                            <td>
                                <a th:href="@{/employer/jobs/{id}/applicants(id=${job.id})}" class="applicant-count">
                                    <i class="fas fa-users"></i> <span th:text="${job.applications.size()}">0</span>
                                </a>
                            </td>
                            <td th:text="${#temporals.format(job.postedDate, 'dd MMM')}">Date</td>
                            <td>
                                <span class="status-badge" th:classappend="${job.active ? 'status-hired' : 'status-rejected'}"
                                      th:text="${job.active ? 'Active' : 'Inactive'}">Status</span>
                            </td>
                            <td class="action-buttons">
                                <a th:href="@{/employer/jobs/{id}/applicants(id=${job.id})}" class="btn btn-sm btn-outline" title="View Applicants">
                                    <i class="fas fa-users"></i>
                                </a>
                                <a th:href="@{/employer/jobs/{id}/edit(id=${job.id})}" class="btn btn-sm btn-outline" title="Edit">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <form th:action="@{/employer/jobs/{id}/toggle(id=${job.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-outline" th:title="${job.active ? 'Deactivate' : 'Activate'}">
                                        <i th:class="${job.active ? 'fas fa-pause' : 'fas fa-play'}"></i>
                                    </button>
                                </form>
                                <form th:action="@{/employer/jobs/{id}/delete(id=${job.id})}" method="post" style="display:inline;"
                                      onsubmit="return confirm('Are you sure you want to delete this job?');">
                                    <button type="submit" class="btn btn-sm btn-danger" title="Delete">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(jobs)}" class="empty-state">
            <i class="fas fa-briefcase"></i>
            <h3>No jobs posted yet</h3>
            <p>Create your first job posting to start receiving applications</p>
            <a th:href="@{/employer/jobs/new}" class="btn btn-primary"><i class="fas fa-plus-circle"></i> Post a Job</a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
