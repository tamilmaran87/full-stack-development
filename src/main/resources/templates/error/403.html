<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Access Denied')}">
    <title>Access Denied | RecruitPro</title>
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="error-page">
    <div class="error-content">
        <div class="error-code">403</div>
        <h1>Access Denied</h1>
        <p th:text="${errorMessage ?: 'You do not have permission to access this page.'}">Forbidden</p>
        <a th:href="@{/}" class="btn btn-primary"><i class="fas fa-home"></i> Go Home</a>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
