<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Page Not Found')}">
    <title>Not Found | RecruitPro</title>
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="error-page">
    <div class="error-content">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p th:text="${errorMessage ?: 'The page you are looking for does not exist.'}">Not found</p>
        <a th:href="@{/}" class="btn btn-primary"><i class="fas fa-home"></i> Go Home</a>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
