<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Edit Job')}">
    <title>Edit Job | RecruitPro</title>
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="page-content">
    <div class="container container-sm">
        <div class="page-header"><h1><i class="fas fa-edit"></i> Edit Job</h1></div>
        <div class="form-card glass-card">
            <form th:action="@{/employer/jobs/{id}(id=${job.id})}" th:object="${job}" method="post" class="styled-form">
                <div class="form-group">
                    <label for="title"><i class="fas fa-heading"></i> Job Title *</label>
                    <input type="text" id="title" th:field="*{title}" required class="form-control">
                    <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="field-error"></span>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="category"><i class="fas fa-tag"></i> Category</label>
                        <select id="category" th:field="*{category}" class="form-control">
                            <option value="">Select Category</option>
                            <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}">Cat</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="location"><i class="fas fa-map-marker-alt"></i> Location</label>
                        <input type="text" id="location" th:field="*{location}" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label for="description"><i class="fas fa-file-alt"></i> Job Description *</label>
                    <textarea id="description" th:field="*{description}" required rows="6" class="form-control"></textarea>
                    <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="field-error"></span>
                </div>
                <div class="form-group">
                    <label for="skillsRequired"><i class="fas fa-cogs"></i> Skills Required</label>
                    <input type="text" id="skillsRequired" th:field="*{skillsRequired}" class="form-control">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="experienceRequired"><i class="fas fa-clock"></i> Min Experience (years)</label>
                        <input type="number" id="experienceRequired" th:field="*{experienceRequired}" min="0" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="salary"><i class="fas fa-rupee-sign"></i> Annual Salary (₹)</label>
                        <input type="number" id="salary" th:field="*{salary}" min="0" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label for="deadline"><i class="fas fa-calendar"></i> Application Deadline</label>
                    <input type="date" id="deadline" th:field="*{deadline}" class="form-control">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save"></i> Update Job</button>
                    <a th:href="@{/employer/jobs}" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
